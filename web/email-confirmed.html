<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم تأكيد البريد الإلكتروني - Century Fries</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
    }

    /* Animated background glow */
    .glow-1 {
      position: fixed;
      top: -150px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 193, 7, 0.15) 0%, transparent 70%);
      animation: float 6s ease-in-out infinite;
    }

    .glow-2 {
      position: fixed;
      bottom: -120px;
      left: -80px;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 193, 7, 0.1) 0%, transparent 70%);
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-30px);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 460px;
      width: 90%;
      padding: 40px 30px;
      text-align: center;
    }

    /* Animated checkmark */
    .check-circle {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      position: relative;
      animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes scaleIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .check-circle svg {
      width: 100%;
      height: 100%;
    }

    .check-circle .circle {
      fill: none;
      stroke: #FFC107;
      stroke-width: 3;
      stroke-dasharray: 377;
      stroke-dashoffset: 377;
      animation: drawCircle 0.8s ease-out 0.3s forwards;
    }

    .check-circle .check {
      fill: none;
      stroke: #FFC107;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: drawCheck 0.5s ease-out 0.9s forwards;
    }

    @keyframes drawCircle {
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes drawCheck {
      100% {
        stroke-dashoffset: 0;
      }
    }

    .check-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 193, 7, 0.2) 0%, transparent 70%);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.5;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 0.8;
      }
    }

    h1 {
      color: #FFC107;
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.1s forwards;
    }

    .subtitle {
      color: #aaa;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 35px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.3s forwards;
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 193, 7, 0.15);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.5s forwards;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: right;
      padding: 10px 0;
    }

    .step+.step {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .step-icon {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 12px;
      background: rgba(255, 193, 7, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .step-text {
      flex: 1;
    }

    .step-title {
      color: #eee;
      font-size: 14px;
      font-weight: 700;
    }

    .step-desc {
      color: #888;
      font-size: 12px;
      margin-top: 2px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 32px;
      background: #FFC107;
      color: #000;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(255, 193, 7, 0.25);
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.7s forwards;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(255, 193, 7, 0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .brand {
      margin-top: 30px;
      color: #555;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 1.9s forwards;
    }

    .brand span {
      color: #FFC107;
    }

    /* Confetti particles */
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall 3s ease-out forwards;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(-100px) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="confetti" id="confetti"></div>

  <div class="container">
    <div class="check-circle">
      <div class="check-glow"></div>
      <svg viewBox="0 0 120 120">
        <circle class="circle" cx="60" cy="60" r="55" />
        <polyline class="check" points="35,62 52,78 85,42" />
      </svg>
    </div>

    <h1>تم تأكيد البريد الإلكتروني! ✨</h1>
    <p class="subtitle">
      تم تفعيل حسابك بنجاح.<br>
      يمكنك الآن العودة إلى التطبيق وتسجيل الدخول.
    </p>

    <div class="card">
      <div class="step">
        <div class="step-icon">📱</div>
        <div class="step-text">
          <div class="step-title">افتح التطبيق</div>
          <div class="step-desc">ارجع إلى تطبيق Century Fries</div>
        </div>
      </div>
      <div class="step">
        <div class="step-icon">🔑</div>
        <div class="step-text">
          <div class="step-title">سجّل الدخول</div>
          <div class="step-desc">استخدم بريدك الإلكتروني وكلمة المرور</div>
        </div>
      </div>
      <div class="step">
        <div class="step-icon">🎉</div>
        <div class="step-text">
          <div class="step-title">استمتع!</div>
          <div class="step-desc">حسابك جاهز للاستخدام الآن</div>
        </div>
      </div>
    </div>

    <a href="centuryfries://login-callback" class="btn" onclick="tryOpenApp()">
      فتح التطبيق →
    </a>

    <div class="brand">CENTURY <span>FRIES</span></div>
  </div>

  <script>
    // Confetti animation
    function createConfetti() {
      const container = document.getElementById('confetti');
      const colors = ['#FFC107', '#FFD54F', '#FFE082', '#FFCA28', '#FFA000', '#FF8F00'];

      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 2) + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        container.appendChild(piece);
      }
    }

    // Start confetti after animations
    setTimeout(createConfetti, 1200);

    // Try to open app via deep link
    function tryOpenApp() {
      window.location.href = 'centuryfries://login-callback';
    }
  </script>
</body>

</html>
